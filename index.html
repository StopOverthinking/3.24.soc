<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>민주주의 길찾기 미로</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <main class="layout">
      <section class="game-panel">
        <div class="board-header">
          <div>
            <h2 id="stage-title">4.19 혁명 미로</h2>
            <p id="stage-goal">퀴즈 칸을 찾아 풀고 출구까지 가세요.</p>
          </div>
          <div class="board-tools">
            <div class="legend">
              <span><i class="legend-player"></i>나</span>
              <span><i class="legend-quiz"></i>퀴즈</span>
              <span><i class="legend-goal"></i>출구</span>
            </div>
            <button id="reset-button" class="ghost-button compact-button" type="button">처음부터 다시</button>
          </div>
        </div>

        <div id="maze" class="maze" aria-label="미로 게임판"></div>

        <div class="controls">
          <button class="move-button" data-direction="up" type="button">↑</button>
          <div class="side-buttons">
            <button class="move-button" data-direction="left" type="button">←</button>
            <button class="move-button" data-direction="down" type="button">↓</button>
            <button class="move-button" data-direction="right" type="button">→</button>
          </div>
        </div>

        <p class="tip">
          조작: 방향 버튼 또는 키보드 화살표 / WASD
        </p>
      </section>
    </main>
  </div>

  <div id="quiz-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="quiz-question">
    <div class="modal-card">
      <p class="modal-tag" id="quiz-tag"></p>
      <h3 id="quiz-question"></h3>
      <div id="quiz-options" class="options"></div>
      <p id="quiz-feedback" class="feedback"></p>
      <button id="next-button" class="primary-button hidden" type="button">계속하기</button>
    </div>
  </div>

  <div id="ending-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="ending-title">
    <div class="modal-card ending-card">
      <p class="modal-tag">탐험 완료</p>
      <h3 id="ending-title">민주주의 길을 모두 통과했어요.</h3>
      <p id="ending-text"></p>
      <button id="ending-reset" class="primary-button" type="button">다시 플레이</button>
    </div>
  </div>

  <div id="answer-flash" class="answer-flash" aria-hidden="true"></div>

  <script src="script.js"></script>
</body>
</html>
